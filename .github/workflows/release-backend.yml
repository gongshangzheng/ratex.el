name: Release Backend

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: ratex-editor-backend-linux
            binary_path: backend/target/release/ratex-editor-backend
          - os: macos-latest
            asset_name: ratex-editor-backend-macos
            binary_path: backend/target/release/ratex-editor-backend
          - os: windows-latest
            asset_name: ratex-editor-backend-windows.exe
            binary_path: backend/target/release/ratex-editor-backend.exe

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Build backend
        run: cargo build --release --manifest-path backend/Cargo.toml

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
